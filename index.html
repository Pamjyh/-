<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MATH QUEST</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+Thai:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e1422; --card:#19213a; --card2:#202b45;
  --red:#e60012; --red2:#b80010; --red3:#7a0008;
  --blue:#009ac7; --gold:#f7c948; --gold2:#c9920e;
  --grn:#3cc054; --grn2:#228b35;
  --wht:#e8f0fe; --gray:#6a7fa0; --brd:#283252;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden;}
/* STARS */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
/* CARD */
.card{position:relative;z-index:1;background:var(--card);border:2px solid var(--brd);border-radius:20px;padding:18px;width:100%;max-width:420px;min-height:560px;box-shadow:0 20px 60px #0009,0 0 40px rgba(0,154,199,.08);}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--red),var(--blue));border-radius:20px 0 0 20px;}
/* LOGO */
.logo{text-align:center;margin-bottom:12px;}
.logo-main{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--gold);text-shadow:0 0 12px rgba(247,201,72,.6),0 2px 0 var(--gold2);}
.logo-sub{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--blue);letter-spacing:2px;display:block;margin-top:4px;}
.logo-stars{font-size:13px;letter-spacing:6px;margin-top:4px;animation:starblink 2s infinite;}
@keyframes starblink{0%,100%{opacity:1}50%{opacity:.4}}
/* LABELS */
.slbl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gray);letter-spacing:2px;margin-bottom:6px;margin-top:10px;}
/* PLAYER BUTTONS */
.player-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.player-btn{padding:6px 10px;background:var(--card2);border:2px solid var(--brd);border-bottom:4px solid #141b30;border-radius:12px;color:var(--wht);cursor:pointer;transition:all .1s;text-align:center;line-height:1.4;}
.player-btn:active{transform:translateY(2px);border-bottom-width:2px;}
.player-btn .pb-cls{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gray);display:block;}
.player-btn .pb-name{font-size:14px;font-weight:700;display:block;}
.player-btn.selected{border-color:var(--gold);background:#1e1a00;box-shadow:0 0 10px rgba(247,201,72,.3);}
.player-btn.selected .pb-name{color:var(--gold);}
/* NEW PLAYER FORM */
.new-form{background:var(--card2);border:1px solid var(--brd);border-radius:12px;padding:12px;margin-top:8px;}
.new-form-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gray);letter-spacing:1px;margin-bottom:8px;}
.form-row{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap;}
.fi{background:#0d1520;border:2px solid var(--brd);border-radius:8px;color:var(--wht);font-size:14px;font-family:'Noto Sans Thai',sans-serif;padding:8px 10px;outline:none;min-width:0;}
.fi:focus{border-color:var(--blue);}
.fi-name{flex:1;min-width:80px;}
.fi-sel{flex:none;width:66px;cursor:pointer;appearance:auto;}
.fi-num{flex:none;width:58px;-moz-appearance:textfield;}
.fi-num::-webkit-inner-spin-button{display:none;}
.ok-btn{background:var(--blue);border:2px solid #006b8a;border-bottom:4px solid #004f66;border-radius:8px;color:white;font-family:'Press Start 2P',monospace;font-size:9px;padding:9px 12px;cursor:pointer;white-space:nowrap;}
.ok-btn:active{transform:translateY(2px);border-bottom-width:2px;}
/* BLOCK GRID */
.block-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px;}
.q-block{position:relative;padding:9px 4px;text-align:center;cursor:pointer;background:linear-gradient(160deg,#c9920e,#a87200);border:3px solid #7a5200;border-bottom-width:5px;border-radius:7px;color:#ffe8a0;font-family:'Press Start 2P',monospace;font-size:13px;text-shadow:0 1px 0 #5a3b00;box-shadow:inset 0 2px 0 rgba(255,255,255,.25);transition:all .08s;user-select:none;}
.q-block:active{transform:translateY(2px);border-bottom-width:3px;}
.q-block.selected{background:linear-gradient(160deg,var(--red),var(--red2));border-color:var(--red3);color:white;box-shadow:inset 0 2px 0 rgba(255,100,100,.3),0 0 12px rgba(230,0,18,.5);}
.q-block.passed{background:linear-gradient(160deg,var(--grn),var(--grn2));border-color:#155022;color:white;}
.q-block.passed::after{content:'★';position:absolute;top:-6px;right:-5px;font-size:10px;color:var(--gold);font-family:sans-serif;}
/* START */
.start-btn{width:100%;margin-top:12px;background:linear-gradient(160deg,#ff1a2e,var(--red));border:3px solid var(--red3);border-bottom:6px solid #5a0008;border-radius:30px;color:white;font-family:'Press Start 2P',monospace;font-size:13px;letter-spacing:2px;padding:13px;cursor:pointer;box-shadow:0 4px 20px rgba(230,0,18,.4);transition:all .08s;}
.start-btn:active{transform:translateY(3px);border-bottom-width:3px;}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.cleared-badge{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--grn);}
.hof-link{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--blue);cursor:pointer;text-decoration:underline;}
/* PRACTICE HEADER */
.ph{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.back-btn{background:var(--card2);border:2px solid var(--brd);border-bottom:4px solid #141b30;border-radius:8px;width:34px;height:34px;color:var(--wht);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .08s;}
.back-btn:active{transform:translateY(2px);border-bottom-width:2px;}
.ph-title{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--wht);}
.ph-player{margin-left:auto;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gold);text-align:right;line-height:1.7;}
/* PROGRESS */
.prg-wrap{margin-bottom:8px;}
.prg-top{display:flex;justify-content:space-between;margin-bottom:3px;}
.prg-top span{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gray);}
.prg-bar{background:#080d14;border:1px solid var(--brd);border-radius:4px;height:10px;overflow:hidden;}
.prg-fill{height:100%;background:linear-gradient(90deg,#4cd137,#23b82b);box-shadow:0 0 6px rgba(76,209,55,.4);transition:width .4s,background .4s;border-radius:4px;}
.prg-fill.low{background:linear-gradient(90deg,#f7c948,#e8a500);}
.prg-fill.crit{background:linear-gradient(90deg,#e60012,#c2000f);}
/* CONT TABLE */
.cont-scroll{max-height:210px;overflow-y:auto;margin-bottom:8px;background:#080d14;border:1px solid var(--brd);border-radius:12px;padding:8px;scrollbar-width:thin;scrollbar-color:var(--brd) transparent;}
.c-row{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;margin-bottom:2px;transition:background .2s;}
.c-row .c-ic{font-size:13px;width:17px;flex-shrink:0;text-align:center;}
.c-row .c-eq{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--wht);min-width:75px;}
.c-row .c-th{font-size:12px;color:var(--gray);}
.c-row.ok{background:rgba(60,192,84,.12);}
.c-row.ok .c-eq{color:var(--grn);}
.c-row.ok .c-th{color:#52a35e;}
.c-row.fail{background:rgba(230,0,18,.1);}
.c-row.fail .c-eq{color:#ff6b7a;}
.c-row.fail .c-th{color:#a05060;}
/* SPEAK */
.speak-btn{width:100%;padding:7px;margin-bottom:7px;background:var(--card2);border:1px solid var(--brd);border-bottom:3px solid #141b30;border-radius:8px;color:var(--gray);font-size:12px;font-weight:700;cursor:pointer;transition:all .08s;}
.speak-btn:active{transform:translateY(1px);border-bottom-width:1px;}
/* FEEDBACK */
.fb{border-radius:10px;padding:8px 14px;margin-bottom:7px;min-height:38px;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Press Start 2P',monospace;font-size:8px;line-height:1.8;transition:all .2s;}
.fb-idle{background:#111827;border:1px solid var(--brd);color:var(--gray);}
.fb-listen{background:#0d1f2e;border:1px solid var(--blue);color:var(--blue);animation:fbpulse 1s infinite;}
.fb-ok{background:#0a1f0f;border:1px solid var(--grn);color:var(--grn);animation:fbpop .3s;}
.fb-fail{background:#1f0a0a;border:1px solid var(--red);color:#ff6b7a;animation:fbshake .3s;}
@keyframes fbpulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes fbpop{0%{transform:scale(.9);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes fbshake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
/* TRANSCRIPT */
.tx{background:#080d14;border:1px dashed #283252;border-radius:8px;padding:7px 12px;font-size:12px;color:#3a5870;min-height:34px;margin-bottom:8px;word-break:break-all;line-height:1.5;}
/* MIC AREA */
.mic-area{display:flex;flex-direction:column;align-items:center;gap:6px;}
.a-btn{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ff3a4e,var(--red) 60%,var(--red2));border:4px solid var(--red3);border-bottom:7px solid #5a0008;display:inline-flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:0 0 20px rgba(230,0,18,.35),inset 0 2px 0 rgba(255,150,150,.25);transition:all .08s;position:relative;}
.a-btn::before{content:'A';position:absolute;bottom:4px;right:6px;font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(255,255,255,.3);}
.a-btn:active{transform:translateY(3px);border-bottom-width:4px;}
.a-btn.listening{animation:aglow .8s infinite alternate;box-shadow:0 0 0 4px rgba(230,0,18,.2),0 0 30px rgba(230,0,18,.7);}
.a-btn.correct{background:radial-gradient(circle at 35% 30%,#5de06b,var(--grn) 60%,var(--grn2));border-color:#155022;border-bottom-color:#0a2e12;box-shadow:0 0 20px rgba(60,192,84,.5);}
@keyframes aglow{from{box-shadow:0 0 0 4px rgba(230,0,18,.2),0 0 20px rgba(230,0,18,.5)}to{box-shadow:0 0 0 8px rgba(230,0,18,.1),0 0 45px rgba(230,0,18,.9)}}
.mic-lbl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gray);letter-spacing:1px;}
/* MIC LEVEL BAR */
.mic-lvl-box{width:100%;background:#080d14;border:1px solid var(--brd);border-radius:10px;padding:8px 10px;}
.mic-lvl-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.mic-lvl-top span{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gray);}
.mic-lvl-hint{font-family:'Press Start 2P',monospace;font-size:7px;text-align:center;}
.mic-lvl-track{background:#1a2235;border-radius:4px;height:12px;overflow:hidden;position:relative;}
.mic-lvl-fill{position:absolute;left:0;top:0;height:100%;width:0%;border-radius:4px;transition:width .04s;}
/* Segmented tick marks */
.mic-lvl-track::before,.mic-lvl-track::after{content:'';position:absolute;top:0;height:100%;width:1px;background:rgba(255,255,255,.1);}
.mic-lvl-track::before{left:33%;}
.mic-lvl-track::after{left:66%;}
/* RESULT */
.res-center{text-align:center;padding:6px 0 10px;}
.res-stars{font-size:38px;letter-spacing:6px;margin-bottom:6px;}
.res-title{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--gold);text-shadow:0 0 12px rgba(247,201,72,.6);margin-bottom:4px;animation:rglow 1.5s ease-in-out infinite alternate;}
@keyframes rglow{from{text-shadow:0 0 8px rgba(247,201,72,.4)}to{text-shadow:0 0 20px rgba(247,201,72,.9),0 0 40px rgba(247,201,72,.3)}}
.res-sub{font-size:13px;color:var(--gray);margin-bottom:4px;}
.res-stat{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--wht);margin-bottom:12px;}
.res-card{background:#0d1520;border:1px solid var(--brd);border-radius:12px;padding:12px;margin-bottom:12px;}
.res-rlbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gray);letter-spacing:1px;margin-bottom:8px;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #1a2235;font-size:12px;}
.res-row:last-child{border-bottom:none;}
.res-row .r-eq{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--wht);}
.res-row .r-th{color:#ff6b7a;font-size:11px;}
.res-btns{display:flex;gap:7px;}
.res-btn{flex:1;padding:10px 6px;border-radius:10px;border:2px solid;font-size:12px;font-weight:700;cursor:pointer;border-bottom-width:4px;transition:all .08s;text-align:center;}
.res-btn:active{transform:translateY(2px);border-bottom-width:2px;}
.res-btn.primary{background:linear-gradient(160deg,#ff1a2e,var(--red));border-color:var(--red3);color:white;box-shadow:0 0 16px rgba(230,0,18,.3);}
.res-btn.secondary{background:var(--card2);border-color:var(--brd);color:var(--wht);}
.res-btn.share{background:linear-gradient(160deg,#059669,var(--grn2));border-color:#0a4224;color:white;box-shadow:0 0 12px rgba(5,150,105,.3);}
.share-toast{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--grn);text-align:center;margin-top:6px;min-height:14px;}
/* SCOREBOARD OVERLAY */
#hofOverlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(10,12,24,.97);padding:14px;overflow-y:auto;}
.hof-inner{max-width:420px;margin:0 auto;}
.hof-title{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--gold);text-align:center;margin-bottom:12px;}
/* Class filter tabs */
.cls-tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.cls-tab{padding:5px 10px;background:var(--card2);border:1px solid var(--brd);border-radius:20px;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gray);cursor:pointer;transition:all .1s;}
.cls-tab.active{background:var(--blue);border-color:var(--blue);color:white;}
/* HOF TABLE */
.hof-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.hof-tbl th{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gray);padding:5px 6px;text-align:left;border-bottom:1px solid var(--brd);}
.hof-tbl td{padding:6px 6px;border-bottom:1px solid #1a2235;vertical-align:middle;}
.hof-tbl td.td-name{color:var(--gold);font-weight:700;font-size:13px;}
.hof-tbl td.td-cls{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gray);}
/* World dots */
.world-dots{display:flex;gap:3px;flex-wrap:nowrap;}
.wdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.wdot.ok{background:var(--grn);}
.wdot.no{background:#1a2235;border:1px solid #283252;}
.td-date{font-size:11px;color:var(--gray);white-space:nowrap;}
.hof-close{width:100%;padding:11px;margin-top:14px;background:var(--card2);border:2px solid var(--brd);border-radius:10px;color:var(--wht);font-family:'Press Start 2P',monospace;font-size:8px;cursor:pointer;}
/* SCREENS */
.screen{display:none;}
.screen.active{display:block;}
/* FLASH */
#flash{position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0;transition:opacity .08s;}
</style>
</head>
<body>
<div id="stars"></div>
<div id="flash"></div>

<div class="card">

  <!-- PLAYER SELECT -->
  <div id="s-player" class="screen active">
    <div class="logo">
      <div class="logo-main">MATH QUEST</div>
      <span class="logo-sub">MULTIPLICATION MASTER</span>
      <div class="logo-stars">★ ★ ★</div>
    </div>
    <div class="slbl">▶ SELECT PLAYER</div>
    <div class="player-grid" id="playerGrid"></div>
    <div class="new-form">
      <div class="new-form-lbl">▶ NEW PLAYER</div>
      <input id="fi-name" class="fi fi-name" type="text" maxlength="10" placeholder="ชื่อ...">
      <div class="form-row">
        <select id="fi-grade" class="fi fi-sel">
          <option>ป.1</option><option>ป.2</option><option>ป.3</option>
          <option selected>ป.4</option><option>ป.5</option><option>ป.6</option>
        </select>
        <select id="fi-room" class="fi fi-sel">
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option>
        </select>
        <input id="fi-num" class="fi fi-num" type="number" min="1" max="50" placeholder="เลขที่">
        <button class="ok-btn" onclick="confirmNewPlayer()">▶ OK</button>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="s-home" class="screen">
    <div class="ph">
      <button class="back-btn" onclick="show('s-player')">←</button>
      <div>
        <div class="ph-title">WORLD SELECT</div>
      </div>
      <div class="ph-player" id="homeBadge"></div>
    </div>
    <div class="slbl">▶ CHOOSE WORLD</div>
    <div class="block-grid" id="tableGrid"></div>
    <button class="start-btn" onclick="startPractice()">▶ START</button>
    <div class="score-row">
      <span class="cleared-badge" id="clearedBadge"></span>
      <span class="hof-link" onclick="showHof()">📊 SCOREBOARD</span>
    </div>
  </div>

  <!-- PRACTICE -->
  <div id="s-cont" class="screen">
    <div class="ph">
      <button class="back-btn" onclick="leavePractice()">←</button>
      <span class="ph-title" id="contTitle">WORLD 2</span>
      <div class="ph-player" id="contBadge"></div>
    </div>
    <div class="prg-wrap">
      <div class="prg-top"><span>STAGE</span><span id="prgCount">0/12</span></div>
      <div class="prg-bar"><div class="prg-fill" id="prgFill" style="width:0%"></div></div>
    </div>
    <div class="cont-scroll" id="contTable"></div>
    <button class="speak-btn" onclick="speakAll()">🔊 ฟังตัวอย่าง</button>
    <div class="fb fb-idle" id="contFb">PUSH A TO START</div>
    <div class="tx" id="contTx">รอการพูด…</div>
    <div class="mic-area">
      <button class="a-btn" id="contMic" onclick="toggleListen()">🎙️</button>
      <div class="mic-lbl" id="micLbl">PUSH A</div>
      <!-- MIC LEVEL BAR -->
      <div class="mic-lvl-box">
        <div class="mic-lvl-top">
          <span>🎙 ระดับเสียง</span>
          <span class="mic-lvl-hint" id="lvlHint">—</span>
        </div>
        <div class="mic-lvl-track">
          <div class="mic-lvl-fill" id="lvlFill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="s-result" class="screen">
    <div class="res-center">
      <div class="res-stars" id="resStars">⭐⭐⭐</div>
      <div class="res-title" id="resTitle">STAGE CLEAR!</div>
      <div class="res-sub"  id="resSub"></div>
      <div class="res-stat" id="resStat"></div>
    </div>
    <div class="res-card" id="resCard">
      <div class="res-rlbl" id="resRlbl">RESULTS</div>
      <div id="resRows"></div>
    </div>
    <div class="res-btns">
      <button class="res-btn secondary" onclick="goHome()">🏠</button>
      <button class="res-btn share" id="shareBtn" onclick="shareParent()">📱 แจ้งผู้ปกครอง</button>
      <button class="res-btn primary" id="resNext" onclick="nextTable()">NEXT ▶</button>
    </div>
    <div class="share-toast" id="shareToast"></div>
  </div>

</div>

<!-- SCOREBOARD -->
<div id="hofOverlay">
  <div class="hof-inner">
    <div class="hof-title">★ SCOREBOARD ★</div>
    <div class="cls-tabs" id="clsTabs"></div>
    <div id="hofContent"></div>
    <button class="hof-close" onclick="hideHof()">← กลับ</button>
  </div>
</div>

<script>
/* ===== STARS ===== */
(()=>{const c=document.getElementById('stars');for(let i=0;i<60;i++){const s=document.createElement('div'),sz=Math.random()*2.5+.5;s.className='star';s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*4}s;`;c.appendChild(s);}})();

/* ===== SOUND ===== */
function snd(t){try{const c=new(window.AudioContext||window.webkitAudioContext)(),mk=(f,s,d,w='square',v=.1)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=w;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime+s);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+s+d);o.start(c.currentTime+s);o.stop(c.currentTime+s+d+.05);};if(t==='coin'){mk(988,0,.08);mk(1319,.09,.18);}if(t==='bad'){mk(220,0,.12);mk(150,.13,.2);}if(t==='clear'){[523,659,784,1047].forEach((f,i)=>mk(f,i*.12,.18));}if(t==='sel')mk(440,0,.08,'square',.07);}catch(e){}}
function flash(col){const e=document.getElementById('flash');e.style.background=col||'white';e.style.opacity='.22';setTimeout(()=>e.style.opacity='0',100);}

/* ===== THAI NUMBERS ===== */
const ON=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
function toThai(n){if(!n)return'ศูนย์';let r='';if(n>=100){r+=ON[Math.floor(n/100)]+'ร้อย';n%=100;if(!n)return r;}if(n>=20){r+=(Math.floor(n/10)===2?'ยี่':ON[Math.floor(n/10)])+'สิบ';n%=10;if(!n)return r;if(n===1)return r+'เอ็ด';}else if(n>=10){r+='สิบ';n-=10;if(!n)return r;if(n===1)return r+'เอ็ด';}return r+ON[n];}
function altForms(n){const m=toThai(n),f=[m];if(n>10&&n%10===1)f.push(m.replace('เอ็ด','หนึ่ง'));return f;}
function tableData(t){return Array.from({length:12},(_,i)=>{const b=i+1,res=t*b;return{a:t,b,res,thai:`${toThai(t)}คูณ${toThai(b)}เท่ากับ${toThai(res)}`,short:`${toThai(t)}${toThai(b)}${toThai(res)}`};});}
function norm(s){return s.replace(/\s+/g,'').replace(/\d+/g,m=>toThai(parseInt(m)));}

/* ===== DETECT ANSWERS (Longest-First Greedy) ===== */
function detectAnswers(tx,tbl){
  const items=Array.from({length:12},(_,i)=>{const r=tbl*(i+1);return{idx:i,forms:altForms(r)};});
  items.sort((a,b)=>b.forms[0].length-a.forms[0].length);
  let text=norm(tx);const found=new Set();
  for(const it of items)for(const f of it.forms)if(text.includes(f)){found.add(it.idx);text=text.split(f).join('░'.repeat(f.length));break;}
  return found;
}

/* ===== LOCAL STORAGE ===== */
const DB='mathquest_v3';
function loadDB(){try{return JSON.parse(localStorage.getItem(DB))||{players:{},names:[],records:[]};}catch{return{players:{},names:[],records:[]};}}
function saveDB(db){try{localStorage.setItem(DB,JSON.stringify(db));}catch{}}
function getPlayerInfo(name){return(loadDB().players||{})[name]||{};}
function upsertPlayer(name,info){const db=loadDB();if(!db.players)db.players={};db.players[name]={...(db.players[name]||{}),...info};if(!db.names)db.names=[];if(!db.names.includes(name))db.names.unshift(name);else db.names=[name,...db.names.filter(n=>n!==name)];db.names=db.names.slice(0,20);saveDB(db);}
function getNames(){return loadDB().names||[];}
function saveRecord(name,table,correct){const db=loadDB();if(!db.records)db.records=[];db.records.push({name,table,correct,date:new Date().toLocaleDateString('th-TH'),ts:Date.now()});if(db.records.length>2000)db.records=db.records.slice(-2000);saveDB(db);}
function getPassedTables(name){const db=loadDB();const p=new Set();(db.records||[]).filter(r=>r.name===name&&r.correct>=10).forEach(r=>p.add(r.table));return p;}
function getLastDate(name){const db=loadDB();const recs=(db.records||[]).filter(r=>r.name===name);if(!recs.length)return'—';return recs[recs.length-1].date;}
function playerClassKey(name){const i=getPlayerInfo(name);return i.grade&&i.room?`${i.grade}/${i.room}`:'';}
function playerTag(name){const i=getPlayerInfo(name);const cls=i.grade&&i.room?`${i.grade}/${i.room}`:'';const no=i.number?`เลขที่${i.number}`:'';return[cls,no].filter(Boolean).join(' ');}

/* ===== MIC LEVEL VISUALIZER ===== */
let micCtx=null,micAna=null,micAF=null,micStream=null;
async function startMicViz(){
  try{
    if(micStream)return;// already running
    micStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    micCtx=new(window.AudioContext||window.webkitAudioContext)();
    micAna=micCtx.createAnalyser();
    micAna.fftSize=512;micAna.smoothingTimeConstant=.7;
    micCtx.createMediaStreamSource(micStream).connect(micAna);
    drawMicViz();
  }catch(e){console.log('Mic viz unavailable');}
}
function drawMicViz(){
  if(!micAna){micAF=null;return;}
  const buf=new Uint8Array(micAna.fftSize);
  micAna.getByteTimeDomainData(buf);
  let sum=0;for(const v of buf){const x=(v-128)/128;sum+=x*x;}
  const rms=Math.sqrt(sum/buf.length);
  const lvl=Math.min(100,rms*300);
  const fill=document.getElementById('lvlFill');
  const hint=document.getElementById('lvlHint');
  if(fill){
    fill.style.width=lvl+'%';
    if(lvl<5){fill.style.background='#6b7280';if(hint)hint.textContent='เงียบมาก';}
    else if(lvl<20){fill.style.background='#f7c948';if(hint)hint.textContent='พูดดังขึ้น';}
    else if(lvl<65){fill.style.background='var(--grn)';if(hint)hint.textContent='ชัดเจน ✓';}
    else{fill.style.background='#ef4444';if(hint)hint.textContent='เบาลงนิด';}
  }
  micAF=requestAnimationFrame(drawMicViz);
}
function stopMicViz(){
  if(micAF)cancelAnimationFrame(micAF);
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  if(micCtx){try{micCtx.close();}catch(e){}}
  micCtx=null;micAna=null;micAF=null;micStream=null;
  const f=document.getElementById('lvlFill');if(f){f.style.width='0%';}
  const h=document.getElementById('lvlHint');if(h)h.textContent='—';
}

/* ===== STATE ===== */
const S={player:'',table:2,passed:new Set(),recog:null,listening:false,allFinal:'',shouldRestart:false,lastCorrect:0,lastFound:null};

/* ===== PLAYER SCREEN ===== */
function initPlayerScreen(){
  const names=getNames(),grid=document.getElementById('playerGrid');
  grid.innerHTML='';
  names.forEach(name=>{
    const info=getPlayerInfo(name),b=document.createElement('button');
    b.className='player-btn'+(name===S.player?' selected':'');
    const tag=playerTag(name);
    b.innerHTML=`<span class="pb-cls">${tag}</span><span class="pb-name">${name}</span>`;
    b.onclick=()=>selectPlayer(name);
    grid.appendChild(b);
  });
  document.getElementById('fi-name').value='';
  document.getElementById('fi-num').value='';
}
function selectPlayer(name){
  S.player=name;S.passed=getPassedTables(name);
  snd('sel');flash('var(--gold)');
  initHome();show('s-home');
}
function confirmNewPlayer(){
  const name=document.getElementById('fi-name').value.trim();
  if(!name){document.getElementById('fi-name').focus();return;}
  const grade=document.getElementById('fi-grade').value;
  const room=document.getElementById('fi-room').value;
  const number=parseInt(document.getElementById('fi-num').value)||0;
  upsertPlayer(name,{grade,room,number});
  selectPlayer(name);
}
document.getElementById('fi-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmNewPlayer();});

/* ===== HOME ===== */
function initHome(){
  S.passed=getPassedTables(S.player);
  const info=getPlayerInfo(S.player);
  const tag=playerTag(S.player);
  document.getElementById('homeBadge').innerHTML=`${S.player}<br><span style="font-size:6px;color:var(--gray)">${tag}</span>`;
  const grid=document.getElementById('tableGrid');
  grid.innerHTML='';
  for(let i=2;i<=12;i++){
    const b=document.createElement('button');
    b.className='q-block'+(i===S.table?' selected':'')+(S.passed.has(i)?' passed':'');
    b.textContent=i;
    b.onclick=()=>{S.table=i;snd('sel');document.querySelectorAll('.q-block').forEach((el,idx)=>{el.className='q-block'+(idx+2===S.table?' selected':'')+(S.passed.has(idx+2)?' passed':'');});};
    grid.appendChild(b);
  }
  const n=S.passed.size;
  document.getElementById('clearedBadge').textContent=n>0?`★ ${n}/11 WORLDS CLEARED`:'';
}
function goHome(){stopListening();stopMicViz();speechSynthesis&&speechSynthesis.cancel();initHome();show('s-home');}
function leavePractice(){stopListening();stopMicViz();speechSynthesis&&speechSynthesis.cancel();show('s-home');}

/* ===== PRACTICE ===== */
function startPractice(){
  S.allFinal='';S.shouldRestart=false;S.lastCorrect=0;S.lastFound=null;
  const data=tableData(S.table);
  const tag=playerTag(S.player);
  document.getElementById('contTitle').textContent=`WORLD ${S.table}`;
  document.getElementById('contBadge').innerHTML=`${S.player}<br><span style="font-size:6px;color:var(--gray)">${tag}</span>`;
  setProgress(0);
  const tbl=document.getElementById('contTable');
  tbl.innerHTML=data.map((d,i)=>
    `<div class="c-row" id="cr-${i}">
       <span class="c-ic" id="ci-${i}">·</span>
       <span class="c-eq">${d.a}×${d.b}=${d.res}</span>
       <span class="c-th" id="ct-${i}">${d.short}</span>
     </div>`
  ).join('');
  setFb('idle','PUSH A TO START');
  document.getElementById('contTx').textContent='รอการพูด…';
  document.getElementById('contMic').className='a-btn';
  document.getElementById('contMic').textContent='🎙️';
  document.getElementById('micLbl').textContent='PUSH A';
  snd('sel');
  show('s-cont');
  // Start mic visualizer immediately (passive — shows level before recording)
  startMicViz();
}
function setProgress(n){
  const p=(n/12)*100;
  const f=document.getElementById('prgFill');
  f.style.width=p+'%';
  f.className='prg-fill'+(p>66?'':p>33?' low':' crit');
  document.getElementById('prgCount').textContent=`${n}/12`;
}

/* ===== SPEECH RECOGNITION ===== */
function toggleListen(){if(S.listening){S.shouldRestart=false;S.recog&&S.recog.stop();}else startListening();}
function stopListening(){S.shouldRestart=false;S.listening=false;S.recog&&S.recog.stop();}

function startListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('ต้องใช้ Chrome หรือ Edge ครับ');return;}
  const r=new SR();
  r.lang='th-TH';r.continuous=true;r.interimResults=true;r.maxAlternatives=3;
  S.recog=r;S.listening=true;S.allFinal='';S.shouldRestart=true;

  document.getElementById('contMic').className='a-btn listening';
  document.getElementById('contMic').textContent='⏹️';
  document.getElementById('micLbl').textContent='TAP TO STOP';
  setFb('listen','🎙️ RECORDING…  TAP ⏹ TO STOP');

  r.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)S.allFinal+=t;else interim+=t;}
    document.getElementById('contTx').textContent=(S.allFinal+interim)||'…';
    // Live progress update
    if((S.allFinal+interim).length>3){const f=detectAnswers(S.allFinal+interim,S.table);setProgress(f.size);}
  };

  r.onend=()=>{
    if(S.shouldRestart&&S.listening){setTimeout(()=>{if(S.listening)r.start();},120);return;}
    S.listening=false;
    document.getElementById('contMic').textContent='🎙️';
    document.getElementById('micLbl').textContent='PUSH A';
    if(!S.allFinal){document.getElementById('contMic').className='a-btn';setFb('idle','NO INPUT — TRY AGAIN');return;}
    checkResult();
  };

  r.onerror=e=>{
    if(e.error==='no-speech'&&S.shouldRestart&&S.listening){setTimeout(()=>{if(S.listening)r.start();},120);return;}
    S.listening=false;S.shouldRestart=false;
    document.getElementById('contMic').className='a-btn';
    document.getElementById('contMic').textContent='🎙️';
    document.getElementById('micLbl').textContent='PUSH A';
    setFb('fail',e.error==='not-allowed'?'MIC DENIED':e.error==='no-speech'?'NO SPEECH':'ERROR');
  };
  r.start();
}

/* ===== CHECK ===== */
function checkResult(){
  const data=tableData(S.table);
  const found=detectAnswers(S.allFinal,S.table);
  const correct=found.size;
  S.lastCorrect=correct;S.lastFound=found;
  data.forEach((_,i)=>{
    const row=document.getElementById(`cr-${i}`),ic=document.getElementById(`ci-${i}`);
    if(found.has(i)){row.className='c-row ok';ic.textContent='★';}
    else{row.className='c-row fail';ic.textContent='✗';}
  });
  setProgress(correct);
  document.getElementById('contMic').className=correct>=10?'a-btn correct':'a-btn';
  document.getElementById('contMic').textContent=correct>=10?'⭐':'🎙️';
  if(correct>=10){
    setFb('ok',`CLEAR! ${correct}/12`);snd('clear');flash('#f7c948');
    saveRecord(S.player,S.table,correct);
    setTimeout(()=>showResult(data,found,correct),1300);
  }else{
    setFb('fail',`${correct}/12 — TRY AGAIN`);snd('bad');
    setTimeout(()=>{document.getElementById('contMic').className='a-btn';document.getElementById('micLbl').textContent='PUSH A';},300);
  }
}

/* ===== RESULT ===== */
function showResult(data,found,correct){
  stopMicViz();
  S.passed=getPassedTables(S.player);
  const stars=correct===12?'⭐⭐⭐':correct>=11?'⭐⭐':'⭐';
  document.getElementById('resStars').textContent=stars;
  document.getElementById('resTitle').textContent='STAGE CLEAR!';
  document.getElementById('resTitle').style.color='var(--gold)';
  const tag=playerTag(S.player);
  document.getElementById('resSub').textContent=`${S.player}${tag?' — '+tag:''}`;
  document.getElementById('resStat').textContent=`WORLD ${S.table}  •  ${correct}/12 CORRECT`;
  const missed=data.filter((_,i)=>!found.has(i));
  if(missed.length===0){
    document.getElementById('resRlbl').textContent='RESULTS';
    document.getElementById('resRows').innerHTML='<div style="text-align:center;font-size:26px;padding:10px;letter-spacing:8px">⭐⭐⭐</div><div style="text-align:center;font-family:\'Press Start 2P\',monospace;font-size:8px;color:var(--grn);letter-spacing:1px">PERFECT CLEAR!</div>';
  }else{
    document.getElementById('resRlbl').textContent='NEED PRACTICE';
    document.getElementById('resRows').innerHTML=missed.map(d=>`<div class="res-row"><span class="r-eq">${d.a}×${d.b}=${d.res}</span><span class="r-th">${d.short}</span></div>`).join('');
  }
  const nb=document.getElementById('resNext');
  nb.onclick=nextTable;
  nb.textContent=S.table<12?`WORLD ${S.table+1} ▶`:'🏆 ALL CLEAR!';
  document.getElementById('shareToast').textContent='';
  show('s-result');
}

function nextTable(){if(S.table<12){S.table++;startPractice();}else goHome();}

/* ===== SHARE TO PARENT ===== */
function shareParent(){
  const info=getPlayerInfo(S.player);
  const cls=info.grade&&info.room?`${info.grade}/${info.room} เลขที่ ${info.number||'?'}`:S.player;
  const date=new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
  const msg=`✅ ${S.player} (${cls})\nท่องสูตรคูณแม่ ${S.table} ผ่านแล้ว!\nคะแนน ${S.lastCorrect}/12 ข้อ\nวันที่ ${date} 🌟\n#MathQuest`;
  const toast=document.getElementById('shareToast');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(msg).then(()=>{toast.textContent='✅ คัดลอกแล้ว! ส่งให้ผู้ปกครองได้เลย';}).catch(()=>fallbackCopy(msg,toast));
  }else fallbackCopy(msg,toast);
}
function fallbackCopy(text,toast){
  const ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');toast.textContent='✅ คัดลอกแล้ว! ส่งให้ผู้ปกครองได้เลย';}
  catch{toast.textContent='กด "คัดลอก" แล้วส่งให้ผู้ปกครองทาง LINE';}
  document.body.removeChild(ta);
}

/* ===== SPEECH SYNTHESIS ===== */
function speakAll(){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(tableData(S.table).map(d=>d.thai).join(', '));u.lang='th-TH';u.rate=.82;speechSynthesis.speak(u);}

/* ===== SCOREBOARD ===== */
let hofFilter='ALL';
function showHof(){
  buildClsTabs();renderHof(hofFilter);
  document.getElementById('hofOverlay').style.display='block';
}
function hideHof(){document.getElementById('hofOverlay').style.display='none';}

function buildClsTabs(){
  const db=loadDB();
  const clsSet=new Set(['ALL']);
  getNames().forEach(name=>{const i=getPlayerInfo(name);if(i.grade&&i.room)clsSet.add(`${i.grade}/${i.room}`);});
  const tabs=document.getElementById('clsTabs');
  tabs.innerHTML='';
  [...clsSet].forEach(cls=>{
    const b=document.createElement('button');
    b.className='cls-tab'+(cls===hofFilter?' active':'');
    b.textContent=cls==='ALL'?'ทั้งหมด':cls;
    b.onclick=()=>{hofFilter=cls;buildClsTabs();renderHof(cls);};
    tabs.appendChild(b);
  });
}

function renderHof(filter){
  const names=getNames();
  const filtered=filter==='ALL'?names:names.filter(n=>playerClassKey(n)===filter);
  // Sort by class then number
  filtered.sort((a,b)=>{
    const ia=getPlayerInfo(a),ib=getPlayerInfo(b);
    const ca=(ia.grade||'')+(ia.room||''),cb=(ib.grade||'')+(ib.room||'');
    if(ca!==cb)return ca.localeCompare(cb);
    return(ia.number||99)-(ib.number||99);
  });
  if(!filtered.length){document.getElementById('hofContent').innerHTML='<p style="color:var(--gray);text-align:center;padding:20px;font-size:13px">ไม่มีข้อมูล</p>';return;}
  let html=`<table class="hof-tbl"><thead><tr><th>ชื่อ</th><th>ชั้น</th><th>แม่ที่ผ่าน</th><th>ล่าสุด</th></tr></thead><tbody>`;
  filtered.forEach(name=>{
    const info=getPlayerInfo(name);
    const passed=getPassedTables(name);
    const cls=info.grade&&info.room?`${info.grade}/${info.room}`:'—';
    const no=info.number||'—';
    const dots=Array.from({length:11},(_,i)=>`<span class="wdot ${passed.has(i+2)?'ok':'no'}"></span>`).join('');
    html+=`<tr>
      <td class="td-name">${name}<br><span style="font-family:'Press Start 2P',monospace;font-size:7px;color:var(--gray)">เลขที่${no}</span></td>
      <td class="td-cls">${cls}</td>
      <td><div class="world-dots">${dots}</div><div style="font-family:'Press Start 2P',monospace;font-size:6px;color:var(--gray);margin-top:3px">${passed.size}/11</div></td>
      <td class="td-date">${getLastDate(name)}</td>
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('hofContent').innerHTML=html;
}

/* ===== UTIL ===== */
function setFb(type,msg){const e=document.getElementById('contFb');e.className='fb fb-'+type;e.textContent=msg;}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

/* ===== INIT ===== */
initPlayerScreen();
